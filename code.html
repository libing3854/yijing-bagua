<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>易经八卦占卜系统</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@200;300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08080f;--surface:#11111c;--gold:#c9a84c;--gold-light:#e8c547;--gold-dark:#7a6530;--crimson:#9b2a40;--text:#e8e0d0;--text-muted:#6a6458;--kb-bg:#0c0c18;--kb-surface:#141428;--sb-w:0px}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif SC','Songti SC',serif;min-height:100vh;overflow-x:hidden;line-height:1.8}
button,textarea,input{border-radius:0}
button:focus-visible,textarea:focus-visible,input:focus-visible,[tabindex]:focus-visible{outline:2px solid var(--gold-light);outline-offset:4px}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;background-image:radial-gradient(rgba(255,255,255,.03) 1px,transparent 1px);background-size:24px 24px}
#app-wrapper{display:flex;min-height:100vh}
#main-area{flex:1;min-width:0;transition:width .42s cubic-bezier(.2,.8,.3,1)}
body.sb-open #main-area{margin-right:0}
.screen{display:none;min-height:100vh;padding:2rem 1.5rem}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fadeIn .8s ease}
.screen-nav{position:absolute;top:18px;left:18px;z-index:20;display:flex;gap:.6rem}
.nav-btn{background:rgba(17,17,28,.78);border:1px solid rgba(122,101,48,.35);color:var(--text-muted);font-family:inherit;padding:.48rem .85rem;cursor:pointer;letter-spacing:.08em;backdrop-filter:blur(8px);transition:.25s ease}
.nav-btn:hover{color:var(--gold);border-color:var(--gold);background:rgba(201,168,76,.08)}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
#screen-landing{background:radial-gradient(ellipse at 30% 20%,rgba(201,168,76,.06) 0%,transparent 50%),radial-gradient(ellipse at 75% 80%,rgba(139,34,82,.05) 0%,transparent 50%),var(--bg);justify-content:flex-start;padding-top:2.25rem}
.landing-content{text-align:center;position:relative;width:min(980px,100%);margin:0 auto}
.landing-heading{margin-bottom:1rem}
.bagua-orbit{position:relative;width:220px;height:220px;margin:0;display:grid;place-items:center;border:1px solid rgba(122,101,48,.16);border-radius:50%;box-shadow:inset 0 0 35px rgba(201,168,76,.025),0 0 40px rgba(201,168,76,.025);animation:baguaFloat 4s ease-in-out infinite;flex:0 0 auto}
.bagua-orbit::before,.bagua-orbit::after{content:'';position:absolute;border-radius:50%;pointer-events:none}
.bagua-orbit::before{inset:25px;border:1px solid rgba(122,101,48,.12)}
.bagua-orbit::after{inset:-5px;border:1px dashed rgba(122,101,48,.1)}
.bagua-symbol{font-size:5.5rem;color:var(--gold);animation:taijiSpin 14s linear infinite;text-shadow:0 0 40px rgba(201,168,76,.25);display:inline-block;filter:drop-shadow(0 0 20px rgba(201,168,76,.15));transform-origin:50% 50%;line-height:1;z-index:2}
.orbit-trigram{position:absolute;left:50%;top:50%;font-size:1.55rem;line-height:1;color:var(--gold-dark);text-shadow:0 0 12px rgba(201,168,76,.18);transform:translate(-50%,-50%) rotate(var(--angle)) translateY(-91px);transform-origin:center;transition:color .3s,text-shadow .3s,scale .3s;z-index:3}
.orbit-trigram:hover{color:var(--gold-light);text-shadow:0 0 16px rgba(232,197,71,.42);scale:1.14}
@keyframes baguaFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes taijiSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
h1{font-family:'Ma Shan Zheng',serif;font-size:clamp(2.35rem,6vw,4rem);color:var(--gold);letter-spacing:.3em;margin-bottom:.15rem;text-shadow:0 0 30px rgba(201,168,76,.15)}
.subtitle{font-size:.88rem;color:var(--text-muted);letter-spacing:.6em;font-weight:200}
.huangli-card{position:relative;width:min(780px,100%);margin:0 auto 1.25rem;padding:1rem 1.2rem .85rem;background:linear-gradient(135deg,rgba(20,20,34,.94),rgba(11,11,20,.92));border:1px solid rgba(122,101,48,.42);box-shadow:0 18px 50px rgba(0,0,0,.25),inset 0 0 32px rgba(201,168,76,.025);overflow:hidden;text-align:left}
.huangli-card::before,.huangli-card::after{content:'';position:absolute;width:34px;height:34px;border-color:var(--gold-dark);opacity:.48;pointer-events:none}
.huangli-card::before{left:7px;top:7px;border-left:1px solid;border-top:1px solid}
.huangli-card::after{right:7px;bottom:7px;border-right:1px solid;border-bottom:1px solid}
.huangli-head{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:0 .25rem .65rem;border-bottom:1px solid rgba(122,101,48,.18)}
.huangli-title{display:flex;align-items:center;gap:.65rem;font-family:'Ma Shan Zheng',serif;color:var(--gold);font-size:1.2rem;letter-spacing:.22em;white-space:nowrap}
.huangli-title::before{content:'历';display:grid;place-items:center;width:28px;height:28px;border:1px solid var(--crimson);color:#d06080;font-size:.9rem;letter-spacing:0;transform:rotate(-3deg)}
.huangli-solar{font-size:.78rem;color:var(--text-muted);letter-spacing:.08em;text-align:right}
.huangli-main{position:relative;display:grid;grid-template-columns:82px minmax(0,1fr) 170px;gap:.7rem;align-items:center;padding:.8rem .25rem .7rem}
.date-seal{width:78px;height:78px;border:1px solid rgba(201,168,76,.48);display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(201,168,76,.035);box-shadow:inset 0 0 18px rgba(201,168,76,.035)}
.date-seal-day{font-family:'Ma Shan Zheng',serif;font-size:2.55rem;line-height:1;color:var(--gold-light)}
.date-seal-month{font-size:.65rem;color:var(--gold-dark);letter-spacing:.2em;margin-top:.25rem}
.huangli-lunar{font-family:'Ma Shan Zheng',serif;color:var(--gold);font-size:1.35rem;letter-spacing:.12em;line-height:1.4}
.huangli-ganzhi{font-size:.76rem;color:var(--text);letter-spacing:.08em;margin-top:.25rem}
.huangli-term{font-size:.69rem;color:var(--text-muted);letter-spacing:.05em;margin-top:.2rem}
.huangli-main>.date-seal,.huangli-main>div:nth-child(2){position:relative;z-index:1}
.huangli-status{grid-column:3;display:grid;gap:.35rem;padding-left:.9rem;border-left:1px solid rgba(122,101,48,.18);position:relative;z-index:1}
.huangli-status-row{display:flex;justify-content:space-between;gap:.8rem;font-size:.72rem;line-height:1.55}
.huangli-status-row span:first-child{color:var(--text-muted);white-space:nowrap}
.huangli-status-row strong{color:var(--text);font-weight:400;text-align:right}
.huangli-status-row .luck-good{color:var(--gold-light)}
.huangli-status-row .luck-bad{color:#d07182}
.huangli-actions{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1fr;gap:.65rem;padding:.7rem .25rem .25rem;border-top:1px solid rgba(122,101,48,.18)}
.huangli-action{display:grid;grid-template-columns:32px 1fr;gap:.55rem;align-items:start;min-width:0}
.huangli-action-label{width:30px;height:30px;display:grid;place-items:center;border:1px solid;font-family:'Ma Shan Zheng',serif;font-size:1rem}
.huangli-action.yi .huangli-action-label{color:var(--gold);border-color:rgba(201,168,76,.55)}
.huangli-action.ji .huangli-action-label{color:#d07182;border-color:rgba(155,42,64,.65)}
.huangli-tags{display:flex;gap:.3rem;flex-wrap:wrap;padding-top:.1rem}
.huangli-tag{font-size:.66rem;color:var(--text);padding:.08rem .35rem;background:rgba(201,168,76,.04);border:1px solid rgba(122,101,48,.13);line-height:1.65}
.huangli-action.ji .huangli-tag{background:rgba(155,42,64,.04);border-color:rgba(155,42,64,.15)}
.huangli-foot{position:relative;z-index:1;display:flex;justify-content:center;gap:.75rem 1.5rem;flex-wrap:wrap;padding:.55rem .25rem .05rem;color:var(--text-muted);font-size:.65rem;letter-spacing:.06em}
.huangli-foot b{color:var(--gold-dark);font-weight:400}
.huangli-note{position:relative;z-index:1;text-align:center;color:#4f4a43;font-size:.58rem;letter-spacing:.05em;margin-top:.35rem}
.huangli-orbit{position:relative;width:178px;height:178px;margin:.35rem auto 1.4rem;animation:baguaFloat 3s ease-in-out infinite;border-color:rgba(122,101,48,.13);box-shadow:inset 0 0 28px rgba(201,168,76,.02),0 0 30px rgba(201,168,76,.02);z-index:1;will-change:transform}
.huangli-orbit::before{inset:20px}.huangli-orbit::after{inset:-4px}
.huangli-orbit .bagua-symbol{font-size:4.45rem}
.huangli-orbit .orbit-trigram{font-size:1.28rem;transform:translate(-50%,-50%) rotate(var(--angle)) translateY(-73px)}
.home-deco{position:relative;margin:2.5rem auto 0}
.method-grid.home-method-grid{position:relative;left:-28px;width:min(600px,100%);display:grid;grid-template-columns:245px 245px;justify-content:space-between;gap:1rem;margin:8.7rem auto 2.5rem}
.home-method-grid .method-card{width:245px;min-height:132px;justify-content:center}
.deco-line{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;justify-content:center}
.deco-line span{width:40px;height:1px;background:var(--gold-dark)}
.deco-line em{font-style:normal;font-size:.7rem;color:var(--gold-dark);letter-spacing:.3em}
.method-grid{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:1rem}
.method-card{background:0 0;border:1px solid rgba(122,101,48,.3);color:var(--text);padding:1.3rem 2.4rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.55rem;transition:all .3s ease;font-family:inherit;min-width:170px;position:relative;overflow:hidden}
.method-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 120%,rgba(201,168,76,.08),transparent 70%);opacity:0;transition:opacity .3s}
.method-card:hover::before{opacity:1}
.method-card:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:0 10px 30px rgba(0,0,0,.25),0 0 20px rgba(201,168,76,.06)}
.m-icon{font-size:2rem;color:var(--gold-dark);line-height:1;transition:color .3s}
.method-card:hover .m-icon{color:var(--gold)}
.m-title{font-family:'Ma Shan Zheng',serif;font-size:1.35rem;color:var(--gold);letter-spacing:.3em;position:relative;z-index:1}
.m-sub{font-size:.72rem;color:var(--text-muted);letter-spacing:.12em;font-weight:200;position:relative;z-index:1}
#screen-question{background:radial-gradient(ellipse at 50% 30%,rgba(201,168,76,.04) 0%,transparent 60%),var(--bg)}
.question-content{text-align:center;max-width:500px;width:100%}
.question-content h2{font-family:'Ma Shan Zheng',serif;font-size:clamp(1.5rem,4vw,2.2rem);color:var(--gold);margin-bottom:2rem;letter-spacing:.1em}
textarea{width:100%;height:110px;background:var(--surface);border:1px solid rgba(122,101,48,.4);color:var(--text);font-family:'Noto Serif SC',serif;font-size:1rem;padding:1rem;margin-bottom:2rem;outline:0;resize:none;transition:border-color .3s,box-shadow .3s}
textarea:focus{border-color:var(--gold);box-shadow:0 0 20px rgba(201,168,76,.08)}
textarea::placeholder{color:var(--text-muted);font-weight:200}
.question-options{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-bottom:1.5rem}
.question-option{background:var(--surface);border:1px solid rgba(122,101,48,.32);color:var(--text-muted);font-family:'Ma Shan Zheng',serif;font-size:1.25rem;letter-spacing:.18em;padding:1rem .8rem;cursor:pointer;transition:all .25s;position:relative}
.question-option:hover{color:var(--gold);border-color:var(--gold-dark);transform:translateY(-2px)}
.question-option.active{color:var(--gold-light);border-color:var(--gold);background:rgba(201,168,76,.09);box-shadow:0 0 20px rgba(201,168,76,.07)}
.question-option.active::after{content:'已选择';position:absolute;right:.35rem;top:.25rem;font-family:'Noto Serif SC',serif;font-size:.52rem;letter-spacing:.08em;color:var(--gold-dark)}
.question-option:last-child:nth-child(odd){grid-column:1/-1}
.question-hint{font-size:.78rem;color:var(--text-muted);letter-spacing:.1em;margin-bottom:1rem;font-weight:300}
.build-line{display:flex;align-items:center;justify-content:center;gap:6px;height:20px;opacity:0;animation:linePop .5s ease forwards}
@keyframes linePop{from{opacity:0;transform:scaleX(0)}to{opacity:1;transform:scaleX(1)}}
.b-yang{width:90px;height:5px;background:linear-gradient(90deg,var(--gold-dark),var(--gold),var(--gold-dark));border-radius:3px}
.b-yin{display:flex;gap:10px}
.b-yin span{display:block;width:40px;height:5px;background:linear-gradient(90deg,var(--gold-dark),var(--gold),var(--gold-dark));border-radius:3px}
.b-mark{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--crimson);flex-shrink:0}
.b-mark.ph{visibility:hidden}
#screen-throw{background:radial-gradient(ellipse at 50% 40%,rgba(201,168,76,.05) 0%,transparent 50%),var(--bg)}
.throw-content,.card-content{display:flex;flex-direction:column;align-items:center;gap:1.5rem;max-width:560px;width:100%}
.throw-progress,.card-progress{font-family:'Ma Shan Zheng',serif;font-size:1.25rem;color:var(--text-muted);letter-spacing:.15em}
.throw-progress span,.card-progress span{color:var(--gold);font-size:1.5rem;margin:0 .15rem}
.line-label,.card-label{font-family:'Ma Shan Zheng',serif;font-size:1rem;color:var(--gold-dark);letter-spacing:.2em;margin-bottom:-.5rem}
.hex-build,.card-hex{display:flex;flex-direction:column-reverse;gap:10px;padding:1.5rem 2rem;min-height:180px;justify-content:flex-start}
.card-hex{gap:8px;padding:1rem 2rem;min-height:130px}
.coins-box{perspective:600px;margin:.5rem 0}
.coins-row{display:flex;gap:1.8rem}
.coin{width:68px;height:68px;border-radius:50%;background:linear-gradient(145deg,#ddb94e 0%,#c9a84c 40%,#a08a35 100%);border:2.5px solid #8b7530;display:flex;align-items:center;justify-content:center;font-family:'Ma Shan Zheng',serif;font-size:1.4rem;color:#2a1f0a;position:relative;box-shadow:0 4px 14px rgba(0,0,0,.5),inset 0 1px 3px rgba(255,255,255,.18),inset 0 -2px 4px rgba(0,0,0,.12);user-select:none;transform-style:preserve-3d}
.coin.flipping{animation:coinFlip .75s ease-out}
@keyframes coinFlip{0%{transform:translateY(0) rotateX(0)}25%{transform:translateY(-28px) rotateX(900deg)}50%{transform:translateY(-35px) rotateX(1800deg)}75%{transform:translateY(-15px) rotateX(2520deg)}100%{transform:translateY(0) rotateX(2880deg)}}
.coin-inner{position:absolute;width:14px;height:14px;border:1.5px solid rgba(42,31,10,.35);transform:rotate(45deg);pointer-events:none}
.coin-text{position:relative;z-index:1}
.throw-result-text,.card-result-text{font-size:.95rem;color:var(--text-muted);min-height:1.5em;text-align:center;letter-spacing:.05em}
.btn-throw{font-family:'Ma Shan Zheng',serif;font-size:1.5rem;padding:.85rem 3.5rem;background:0 0;color:var(--gold);border:2px solid var(--gold-dark);cursor:pointer;letter-spacing:.35em;transition:all .3s ease;position:relative}
.btn-throw::before{content:'';position:absolute;inset:-4px;border:1px solid rgba(201,168,76,.1);pointer-events:none;transition:all .3s}
.btn-throw:hover{background:var(--gold);color:var(--bg);transform:scale(1.04);box-shadow:0 0 25px rgba(201,168,76,.2)}
.btn-throw:hover::before{inset:-8px;border-color:rgba(201,168,76,.06)}
.btn-throw:disabled{opacity:.25;cursor:not-allowed;transform:none;box-shadow:none}
.btn-throw:disabled:hover{background:0 0;color:var(--gold)}
#screen-cards{background:radial-gradient(ellipse at 50% 35%,rgba(201,168,76,.05) 0%,transparent 50%),var(--bg)}
.card-instruction{font-size:.9rem;color:var(--text-muted);letter-spacing:.2em;font-weight:300;min-height:1.5em;transition:opacity .4s}
.prev-cards{display:flex;gap:.45rem;justify-content:center;min-height:50px;flex-wrap:wrap;align-items:center}
.mini-card{width:34px;height:48px;border-radius:5px;border:1.5px solid;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-family:'Ma Shan Zheng',serif;letter-spacing:.05em;animation:miniPop .35s ease;flex-shrink:0}
@keyframes miniPop{from{opacity:0;transform:scale(.4) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.deck-stage{position:relative;display:flex;flex-direction:column;align-items:center;margin:.6rem 0;min-height:210px;justify-content:flex-end}
.reveal-card{position:absolute;bottom:85px;width:90px;height:130px;z-index:10;opacity:0;transform:translateY(35px);pointer-events:none}
.reveal-card.slide-up{animation:cardSlideUp .55s cubic-bezier(.2,.8,.3,1) forwards}
@keyframes cardSlideUp{0%{opacity:1;transform:translateY(35px) scale(.96)}100%{opacity:1;transform:translateY(0) scale(1)}}
.deck{position:relative;width:90px;height:130px;cursor:pointer;transition:transform .35s cubic-bezier(.2,.8,.3,1),filter .35s}
.deck:hover{transform:translateY(-6px) scale(1.03);filter:brightness(1.12) drop-shadow(0 8px 20px rgba(201,168,76,.18))}
.deck:active{transform:translateY(-2px) scale(.98);filter:brightness(.95);transition-duration:.08s}
.deck.disabled{pointer-events:none;opacity:.35;filter:grayscale(.5);transition:opacity .6s,filter .6s}
.deck .tap-hint{position:absolute;top:-30px;left:50%;transform:translateX(-50%);font-size:.7rem;color:var(--gold-dark);letter-spacing:.15em;white-space:nowrap;opacity:0;animation:hintPulse 2s ease-in-out infinite;pointer-events:none;font-family:'Noto Serif SC',serif}
@keyframes hintPulse{0%,100%{opacity:0;transform:translateX(-50%) translateY(0)}50%{opacity:.7;transform:translateX(-50%) translateY(-4px)}}
.deck .glow-ring{position:absolute;inset:-12px;border-radius:16px;border:1px solid transparent;pointer-events:none;transition:border-color .4s}
.deck:hover .glow-ring{border-color:rgba(201,168,76,.15);box-shadow:0 0 30px rgba(201,168,76,.06)}
.deck-card{position:absolute;left:0;width:100%;height:100%;border-radius:10px;background:linear-gradient(155deg,#1c1630 0%,#0c091a 100%);border:1.5px solid rgba(122,101,48,.5);box-shadow:0 2px 8px rgba(0,0,0,.35);transition:transform .3s}
.deck-card:nth-child(1){top:14px;z-index:1}.deck-card:nth-child(2){top:12px;z-index:2}.deck-card:nth-child(3){top:10px;z-index:3}.deck-card:nth-child(4){top:8px;z-index:4}.deck-card:nth-child(5){top:6px;z-index:5}.deck-card:nth-child(6){top:4px;z-index:6}.deck-card:nth-child(7){top:2px;z-index:7}.deck-card:nth-child(8){top:0;z-index:8}
.deck-card:nth-child(8)::before{content:'☰';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.2rem;color:var(--gold-dark);opacity:.3}
.deck-card:nth-child(8)::after{content:'';position:absolute;top:10px;left:10px;right:10px;bottom:10px;border:1px solid rgba(122,101,48,.12);border-radius:6px}
.deck.shuffling .deck-card:nth-child(5){animation:cutRight 1s ease}
.deck.shuffling .deck-card:nth-child(6){animation:cutRight 1s ease .04s}
.deck.shuffling .deck-card:nth-child(7){animation:cutRight 1s ease .08s}
.deck.shuffling .deck-card:nth-child(8){animation:cutRight 1s ease .12s}
@keyframes cutRight{0%,100%{transform:translateX(0) translateY(0) rotate(0)}18%{transform:translateX(28px) translateY(-14px) rotate(3.5deg)}38%{transform:translateX(28px) translateY(-14px) rotate(3.5deg)}52%{transform:translateX(0) translateY(0) rotate(0)}65%{transform:translateX(-18px) translateY(-10px) rotate(-2deg)}82%{transform:translateX(-18px) translateY(-10px) rotate(-2deg)}}
.deck.sending .deck-card:nth-child(8){animation:cardSend .45s cubic-bezier(.3,.8,.4,1) forwards}
@keyframes cardSend{0%{transform:translateX(0) translateY(0);opacity:1}100%{transform:translateX(0) translateY(-60px) scale(.85);opacity:0}}
.card{width:90px;height:130px;position:relative;transform-style:preserve-3d;transition:transform .7s cubic-bezier(.4,0,.2,1)}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.45rem;overflow:hidden}
.card-front{background:linear-gradient(155deg,#1c1630 0%,#0c091a 100%);border:1.5px solid rgba(122,101,48,.5);box-shadow:0 4px 22px rgba(0,0,0,.45),inset 0 0 40px rgba(201,168,76,.02)}
.card-back{transform:rotateY(180deg)}
.card-front .c-symbol{font-size:2.2rem;color:var(--gold-dark);opacity:.35;line-height:1}
.card-front .c-label{font-family:'Ma Shan Zheng',serif;font-size:.75rem;color:var(--gold-dark);opacity:.3;letter-spacing:.3em}
.card-front .c-border-top,.card-front .c-border-bot{position:absolute;left:12px;right:12px;height:1px;background:var(--gold-dark);opacity:.15}
.card-front .c-border-top{top:10px}
.card-front .c-border-bot{bottom:10px}
.card-back .c-num{font-family:'Ma Shan Zheng',serif;font-size:1.55rem;line-height:1}
.card-back .c-line{display:flex;align-items:center;gap:6px}
.card-back .c-bar{height:4px;border-radius:2px}
.card-back .c-bar.solid{width:50px}
.card-back .c-bar.half{width:21px}

<script>
const TRI_NAME=['坤','震','坎','兑','艮','离','巽','乾'];
const TRI_NATURE=['地','雷','水','泽','山','火','风','天'];
const LINE_LABELS=['— 初 爻 —','— 二 爻 —','— 三 爻 —','— 四 爻 —','— 五 爻 —','— 上 爻 —'];
const NUM_CN=['一','二','三','四','五','六'];
const CN_NUM={6:'六',7:'七',8:'八',9:'九'};
const CN_NAME={6:'老阴',7:'少阳',8:'少阴',9:'老阳'};
const H=[
{n:'坤',f:'坤为地',j:'元亨，利牝马之贞',d:'纯阴之卦，大地承载之象。柔顺包容，厚德载物。此卦宜守不宜进，顺应时势为上策。如大地般沉稳忍耐，终有所成。利于辅佐他人，不宜独断专行。'},
{n:'复',f:'地雷复',j:'亨，出入无疾，朋来无咎',d:'一阳初动于五阴之下，万物复苏之象。否极泰来，转机已现。过去的困顿将逐渐消散，宜把握新生之机，积极但不躁进。'},
{n:'师',f:'地水师',j:'贞，丈人吉，无咎',d:'兵众之象，地中有水。需有正道引领方可成事，利于组织管理、团队统率。但须师出有名，以德服人，忌刚愎自用。'},
{n:'临',f:'地泽临',j:'元亨利贞，至于八月有凶',d:'居高临下之象，地中有泽。时运极佳，宜积极进取、主动出击。但盛极必衰，居安思危方能长久。'},
{n:'谦',f:'地山谦',j:'亨，君子有终',d:'六十四卦中唯一六爻皆吉之卦。内高外低，有德而不自居。越谦逊越亨通，为人处世以谦和为本，必得善终。大吉。'},
{n:'明夷',f:'地火明夷',j:'利艰贞',d:'光明隐入地下之象。时运不济，小人当道。宜韬光养晦、隐忍待时。暗中积蓄力量，保护自身，黎明终将到来。'},
{n:'升',f:'地风升',j:'元亨，用见大人，勿恤',d:'向上升进之象，木生于地而渐长。循序渐进、积小成大。脚踏实地必步步高升，利于求学、晋升。'},
{n:'泰',f:'地天泰',j:'小往大来，吉亨',d:'天地交融、阴阳和合之大吉卦。上下一心，万事通达。是事业与生活的黄金时期，宜乘势而为。切记居安思危。'},
{n:'豫',f:'雷地豫',j:'利建侯行师',d:'雷出地上，万物欢悦之象。和乐安逸之时，宜建功立业。但不可沉溺享乐，须在安乐中保持警觉。'},
{n:'震',f:'震为雷',j:'亨，震来虩虩，笑言哑哑',d:'重雷叠至，震动惊起之象。虽有惊恐变故，但因心存戒惧反获福佑。遇变不惊、沉着应对，可化险为夷。'},
{n:'解',f:'雷水解',j:'利西南，无所往，其来复吉',d:'雷雨交作，困难化解之象。过去的困厄将消散，雨过天晴。宜宽以待人，趁势解决遗留问题。'},
{n:'归妹',f:'雷泽归妹',j:'征凶，无攸利',d:'少女出嫁之象。急于行动则不利，凡事须循正道。感情中可能有波折，顺其自然为上。'},
{n:'小过',f:'雷山小过',j:'亨利贞，可小事不可大事',d:'小有过越之象。小事可为，大事不宜。宜谨守本分，注意细节，宁可不足也不要过分。'},
{n:'丰',f:'雷火丰',j:'亨，王假之，勿忧宜日中',d:'丰盛光明之象，如日中天。事业正旺。但盛极需防衰退，在丰盛时做好储备。'},
{n:'恒',f:'雷风恒',j:'亨，无咎，利贞，利有攸往',d:'雷风相与，恒久不变之象。持之以恒、守正不移则亨通。忌三心二意。'},
{n:'大壮',f:'雷天大壮',j:'利贞',d:'阳气壮盛、刚强有力之象。势头正劲，力量充沛。但须以礼节制、以德驭力，方为真壮。'},
{n:'比',f:'水地比',j:'吉，原筮元永贞，无咎',d:'水与地相亲，亲附辅佐之象。利于团结合作、广结善缘。真诚待人则万事皆顺。'},
{n:'屯',f:'水雷屯',j:'元亨利贞，勿用有攸往',d:'万物初生之象。创业初始，困难重重。宜坚忍不拔，寻求贵人帮助，不可冒然前进。'},
{n:'坎',f:'坎为水',j:'习坎，有孚，维心亨',d:'重重险阻之象。虽处险境，但水性至柔终能穿石。心怀诚信、沉着冷静，以柔克刚方能渡过难关。'},
{n:'节',f:'水泽节',j:'亨，苦节不可贞',d:'节制有度之象。过犹不及，适度节制为吉。量入为出、张弛有度为处世之道。'},
{n:'蹇',f:'水山蹇',j:'利西南，不利东北',d:'前有险阻、举步维艰之象。宜暂停脚步、反思调整。不可冒进，退守为上。'},
{n:'既济',f:'水火既济',j:'亨小，利贞，初吉终乱',d:'水火交融、事已成就之象。守成难于创业，须谨慎持盈。'},
{n:'井',f:'水风井',j:'改邑不改井，无丧无得',d:'水井养人之象。默默奉献、厚积薄发。修养身心，终会泽被他人。'},
{n:'需',f:'水天需',j:'有孚，光亨，贞吉',d:'云聚天上、待时而雨之象。有信心则亨通，耐心等待时机成熟。不可急躁冒进。'},
{n:'萃',f:'泽地萃',j:'亨，王假有庙',d:'聚合汇萃之象。人才汇聚。宜团结协作、凝聚人心，适合集会合作。'},

let renderedHuangliDate='';
function renderHuangli(){
  const now=new Date(),dateKey=[now.getFullYear(),now.getMonth()+1,now.getDate()].join('-');
  if(dateKey===renderedHuangliDate)return;
  renderedHuangliDate=dateKey;
  const solarText=new Intl.DateTimeFormat('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'}).format(now);
  document.getElementById('huangli-solar').textContent=solarText;
  document.getElementById('huangli-day').textContent=now.getDate();
  document.getElementById('huangli-month').textContent=(now.getMonth()+1)+'月';
  if(typeof Solar==='undefined'){
    document.getElementById('huangli-lunar').textContent='黄历暂未载入';
    document.getElementById('huangli-ganzhi').textContent='请刷新页面后重试';
    document.getElementById('huangli-term').textContent='公历日期仍可正常显示';
    return;
  }
  const lunar=Solar.fromDate(now).getLunar();
  const setText=(id,value)=>{document.getElementById(id).textContent=value||'—'};
  const tagList=(id,items)=>{const el=document.getElementById(id);el.innerHTML=(items?.length?items.slice(0,8):['诸事不宜']).map(item=>'<span class="huangli-tag">'+escapeHTML(item)+'</span>').join('');el.title=(items||[]).join(' · ')};
  setText('huangli-lunar','农历'+lunar.getMonthInChinese()+'月'+lunar.getDayInChinese()+' · 肖'+lunar.getYearShengXiao());
  setText('huangli-ganzhi',lunar.getYearInGanZhi()+'年 · '+lunar.getMonthInGanZhi()+'月 · '+lunar.getDayInGanZhi()+'日');
  let term=lunar.getJieQi();
  if(term){term='今日节气 · '+term}else{
    try{const next=lunar.getNextJieQi(true);term='下个节气 · '+next.getName()+'（'+next.getSolar().toYmd()+'）'}catch(e){term='四时有序 · 日月推迁'}
  }
  setText('huangli-term',term);
  const luck=lunar.getDayTianShenLuck();
  const officer=document.getElementById('huangli-officer');
  officer.textContent=lunar.getZhiXing()+'日 · '+lunar.getDayTianShen()+'（'+luck+'）';
  officer.className=luck==='吉'?'luck-good':'luck-bad';
  setText('huangli-clash','冲'+lunar.getChongDesc()+' · 煞'+lunar.getSha());
  setText('huangli-mansion',lunar.getXiu()+'宿 · '+lunar.getXiuLuck());
  tagList('huangli-yi',lunar.getDayYi());
  tagList('huangli-ji',lunar.getDayJi());
  setText('huangli-cai',lunar.getDayPositionCaiDesc());
  setText('huangli-xi',lunar.getDayPositionXiDesc());
  setText('huangli-fu',lunar.getDayPositionFuDesc());
  setText('huangli-pengzu','彭祖百忌：'+lunar.getPengZuGan()+'；'+lunar.getPengZuZhi());
}

function detectTopic(q=''){
  if(/感情|恋爱|婚姻|复合|对象|伴侣|桃花|家庭/.test(q))return'relationship';
  if(/钱|财|投资|股票|基金|生意|收入|买房|卖房/.test(q))return'wealth';
  if(/身心|健康|身体|病|康复|睡眠|手术|怀孕/.test(q))return'health';
  if(/工作|事业|求职|面试|升职|项目|合作|考试|学业/.test(q))return'career';
  return'';
}
function buildModernGrid(m,topic=''){
  if(!m)return'';
  return'<div class="modern-grid">'+[
    ['career','事业',m.career],['relationship','感情',m.relationship],
    ['wealth','财运',m.wealth],['health','身心',m.health]
  ].map(([key,label,value])=>`<div class="modern-item${topic===key?' focus':''}"><div class="modern-label">${label}${topic===key?' · 本次重点':''}</div><div class="modern-text">${value}</div></div>`).join('')+'</div>';
}
function buildClassicDetails(c,withYao=true){
  if(!c)return'';
  const yao=withYao&&c.yaoci?.length?'<div class="classic-row"><b>六爻原文</b><div class="yao-list">'+c.yaoci.map((y,i)=>`<div class="yao-row"><em>${y.label}</em>${y.text}${c.xiaoxiang?.[i]?`<br><span style="color:var(--text-muted)">象曰：${c.xiaoxiang[i]}</span>`:''}</div>`).join('')+'</div></div>':'';
  return`<details class="classic-details"><summary>经典依据 · 卦辞、彖传与象传</summary><div class="classic-body"><div class="classic-row"><b>卦辞</b>${c.guaci}</div><div class="classic-row"><b>彖曰</b>${c.tuan}</div><div class="classic-row"><b>象曰</b>${c.daxiang}</div>${yao}<div class="classic-row" style="color:var(--text-muted)">来源：维基文库《周易/${c.name}》</div></div></details>`;
}
function getSelectedReading(category,classic,modern,hex){
  if(!modern)return hex?.d||'';
  const readings={
    '运势':modern.core+' '+modern.action,
    '事业':modern.career,
    '经商':modern.wealth+' '+modern.warning,
    '求名':modern.career+' 求名重在把能力与成果显明；'+modern.action,
    '婚恋':modern.relationship,
    '决策':modern.action+' 需要避免：'+modern.warning
  };
  return readings[category]||modern.core;
}
function getChangingPairReading(line,originalHex,originalModern,changedHex,changedModern,plainText){
  if(!line?.changing||!changedHex)return'';
  const direction=line.type==='yang'?'阳爻转为阴爻，力量由主动转向收敛':'阴爻转为阳爻，力量由承接转向行动';
  return`<div class="yao-pair-reading"><strong>本卦与之卦合参：</strong>${direction}。在${originalHex.f}中，这一爻表示“${plainText}”；全部变爻变化后形成${changedHex.f}，局势进一步转向“${changedModern?.core||changedHex.d}”。因此判断时既要看此爻指出的当前转折点，也要看之卦所示的后续方向。</div>`;
}

function getHexOverview(hex,classic,modern,upTri,loTri){
  if(PURE_HEX_OVERVIEW[hex.n])return PURE_HEX_OVERVIEW[hex.n];
  const fortune=GOOD_HEX.has(hex.n)?'对事总体偏吉，但仍要符合卦中所示的时机与条件。':CAUTION_HEX.has(hex.n)?'此卦总体偏于警示，宜谨慎处理、先避风险，再寻找转机。':'此卦吉凶随阶段与行动而变，顺应卦意则有利，逆势强求则易生阻碍。';
  const image=classic?.daxiang?`大象为“${classic.daxiang}”`:`上${upTri.name}下${loTri.name}`;
  return`${hex.n}卦，异卦相叠（上${upTri.name}下${loTri.name}），上卦为${upTri.nature}，下卦为${loTri.nature}。${image}。${hex.d}${modern?.core||''}${fortune}`;

function openHexFromResult(kw){
  openSB();
  const tab=document.querySelector('.kb-tab[data-tab="hexagrams"]');
  if(tab&&!tab.classList.contains('active'))tab.click();
  const panel=document.getElementById('kbp-hexagrams');
  const sections=panel?.querySelectorAll('.kb-sec');
  sections?.[kw<30?0:1]?.classList.add('open');
  const tile=document.querySelector(`.hx-tile[data-kw="${kw}"]`);
  if(!tile)return;

function escapeHTML(value){const el=document.createElement('div');el.textContent=value;return el.innerHTML}
function resetQuestionSelection(){question='';document.querySelectorAll('.question-option').forEach(btn=>{btn.classList.remove('active');btn.setAttribute('aria-pressed','false')});document.getElementById('btn-go-method').disabled=true}
document.querySelectorAll('[data-back]').forEach(btn=>btn.onclick=()=>goScreen(btn.dataset.back));
document.querySelectorAll('.question-option').forEach(btn=>btn.onclick=()=>{question=btn.dataset.question;document.querySelectorAll('.question-option').forEach(other=>{const active=other===btn;other.classList.toggle('active',active);other.setAttribute('aria-pressed',String(active))});document.getElementById('btn-go-method').disabled=false});
document.getElementById('btn-coins').onclick=()=>{method='coins';resetQuestionSelection();document.getElementById('btn-go-method').textContent='焚 香 掷 币';goScreen('screen-question')};
document.getElementById('btn-cards').onclick=()=>{method='cards';resetQuestionSelection();document.getElementById('btn-go-method').textContent='诚 心 抽 牌';goScreen('screen-question')};
document.getElementById('btn-go-method').onclick=()=>{if(!question)return;throwCount=0;lines=[];if(method==='coins'){goScreen('screen-throw');resetThrowUI()}else{goScreen('screen-cards');startCardDraw()}};
function resetThrowUI(){document.getElementById('hex-build').innerHTML='';document.getElementById('t-result').textContent='';updateCoinProgress();resetCoins();const b=document.getElementById('btn-throw');b.textContent='掷 铜 钱';b.disabled=false;b.onclick=throwCoins}
function resetCoins(){['c1','c2','c3'].forEach(id=>{const e=document.getElementById(id);e.classList.remove('flipping');e.querySelector('.coin-inner').style.display='';e.querySelector('.coin-text').textContent=''})}
function updateCoinProgress(){document.getElementById('t-count').textContent=NUM_CN[throwCount]||'六';document.getElementById('line-label').textContent=LINE_LABELS[Math.min(throwCount,5)]}
function updateCardProgress(){document.getElementById('c-count').textContent=NUM_CN[throwCount]||'六';document.getElementById('card-label').textContent=LINE_LABELS[Math.min(throwCount,5)]}
function rnd(){return Math.random()<.5?3:2}
function throwCoins(){if(isAnimating||throwCount>=6)return;isAnimating=true;document.getElementById('btn-throw').disabled=true;document.getElementById('t-result').textContent='';resetCoins();const v=[rnd(),rnd(),rnd()];['c1','c2','c3'].forEach((id,i)=>setTimeout(()=>document.getElementById(id).classList.add('flipping'),i*80));setTimeout(()=>{['c1','c2','c3'].forEach((id,i)=>{const e=document.getElementById(id);e.classList.remove('flipping');e.querySelector('.coin-inner').style.display='none';e.querySelector('.coin-text').textContent=v[i]===3?'阳':'阴'});const s=v[0]+v[1]+v[2];let t=s===7||s===9?'yang':'yin',c=s===6||s===9;document.getElementById('t-result').textContent=v.join(' + ')+' = '+s+'　→　'+{6:'老阴（变爻）',7:'少阳',8:'少阴',9:'老阳（变爻）'}[s];lines.push({type:t,changing:c});addLineTo('hex-build',t,c);throwCount++;isAnimating=false;if(throwCount>=6){const b=document.getElementById('btn-throw');b.textContent='查 看 卦 象';b.disabled=false;b.onclick=showResult;document.getElementById('line-label').textContent='— 六 爻 已 备 —'}else{document.getElementById('btn-throw').disabled=false;updateCoinProgress()}},900)}
function addLineTo(cid,type,changing){const c=document.getElementById(cid),el=document.createElement('div');el.className='build-line';const mc=changing?'b-mark':'b-mark ph';if(type==='yang')el.innerHTML='<div class="b-yang"></div><div class="'+mc+'"></div>';else el.innerHTML='<div class="b-yin"><span></span><span></span></div><div class="'+mc+'"></div>';c.appendChild(el)}
function startCardDraw(){throwCount=0;lines=[];cardProcessing=false;document.getElementById('card-hex-build').innerHTML='';document.getElementById('prev-cards').innerHTML='';document.getElementById('card-result-text').textContent='';document.getElementById('card-instruction').textContent='凭直觉点击牌组抽牌';document.getElementById('card-instruction').style.opacity='1';const rc=document.getElementById('reveal-card');rc.innerHTML='';rc.classList.remove('slide-up');rc.style.opacity='0';document.getElementById('deck').classList.remove('disabled');document.getElementById('btn-card-result').style.display='none';updateCardProgress()}
document.getElementById('deck').onclick=function(){if(cardProcessing||throwCount>=6)return;cardProcessing=true;const val=[6,7,8,9][Math.floor(Math.random()*4)];const deck=this,reveal=document.getElementById('reveal-card');document.getElementById('card-result-text').textContent='';document.getElementById('card-instruction').style.opacity='0';deck.classList.add('shuffling');setTimeout(()=>{deck.classList.remove('shuffling');reveal.innerHTML=buildCardHTML(val);reveal.classList.remove('slide-up');reveal.style.opacity='0';void reveal.offsetHeight;reveal.classList.add('slide-up')},650);setTimeout(()=>{deck.classList.add('sending');const c=reveal.querySelector('.card');if(c)c.classList.add('flipped')},1050);setTimeout(()=>{deck.classList.remove('sending');document.getElementById('card-result-text').textContent={6:'老阴 → 阴爻（变爻）',7:'少阳 → 阳爻',8:'少阴 → 阴爻',9:'老阳 → 阳爻（变爻）'}[val]},1450);setTimeout(()=>{addMiniCard(val);reveal.classList.remove('slide-up');reveal.style.opacity='0';const type=(val===7||val===9)?'yang':'yin',changing=(val===6||val===9);lines.push({type,changing});addLineTo('card-hex-build',type,changing);throwCount++;cardProcessing=false;if(throwCount>=6){deck.classList.add('disabled');document.getElementById('btn-card-result').style.display='';document.getElementById('card-label').textContent='— 六 爻 已 备 —';document.getElementById('card-instruction').textContent=''}else{updateCardProgress();document.getElementById('card-instruction').textContent='凭直觉点击牌组抽牌';document.getElementById('card-instruction').style.opacity='1'}},1950)};
document.getElementById('btn-card-result').onclick=showResult;
function addMiniCard(val){const m=document.createElement('div');m.className='mini-card c-t'+val;m.textContent=CN_NUM[val];document.getElementById('prev-cards').appendChild(m)}
function buildCardHTML(val){const isYang=val===7||val===9;const bar=isYang?'<div class="c-bar solid" style="background:currentColor"></div>':'<div class="c-line"><div class="c-bar half" style="background:currentColor"></div><div class="c-bar half" style="background:currentColor"></div></div>';const isChange=val===6||val===9;return '<div class="card"><div class="card-face card-front"><div class="c-border-top"></div><div class="c-symbol">☰</div><div class="c-label">易</div><div class="c-border-bot"></div></div><div class="card-face card-back c-t'+val+'"><div class="c-num">'+CN_NUM[val]+'</div>'+bar+'<div class="c-name">'+CN_NAME[val]+(isChange?' · 变爻':'')+'</div>'+(isChange?'<div class="c-change">'+(val===9?'○ 阳变阴':'● 阴变阳')+'</div>':'')+'</div></div>'}
function trigramVal(a,b,c){let v=0;if(a.type==='yang')v+=1;if(b.type==='yang')v+=2;if(c.type==='yang')v+=4;return v}
function getHexagram(ls){const lo=trigramVal(ls[0],ls[1],ls[2]),up=trigramVal(ls[3],ls[4],ls[5]);return{index:lo+up*8,lower:lo,upper:up}}
function showResult(){
  const{index,lower,upper}=getHexagram(lines),hex=H[index],kw=KW.indexOf(index),classic=CLASSICS[kw],modern=MODERN[kw],hasChanging=lines.some(l=>l.changing);
  let trans='',changedHex=null,changedModern=null;
  if(hasChanging){
    const nl=lines.map(l=>({type:l.changing?(l.type==='yang'?'yin':'yang'):l.type,changing:false}));
    const nh=getHexagram(nl),nHex=H[nh.index],nKw=KW.indexOf(nh.index),nModern=MODERN[nKw];
    changedHex=nHex;changedModern=nModern;
    let tl='';nl.forEach(l=>{tl+=l.type==='yang'?'<div class="t-yang"></div>':'<div class="t-yin"><span></span><span></span></div>'});
    trans='<div class="result-transformed"><div class="transformed-hex-link result-hex-link" role="button" tabindex="0" onclick="openHexFromResult('+nKw+')" onkeydown="handleHexLinkKey(event,'+nKw+')" title="在知识库中查看'+nHex.f+'"><h3>之卦 · '+nHex.f+'</h3><div class="t-lines">'+tl+'</div><div class="t-desc">'+TRI_NAME[nh.upper]+TRI_NATURE[nh.upper]+'上'+TRI_NAME[nh.lower]+TRI_NATURE[nh.lower]+'下 · '+nHex.j+'</div></div><div class="t-meaning">'+(nModern?.core||nHex.d)+'</div></div>';
  }
  let lh='';
  lines.forEach((l,i)=>{const mk=l.changing?'<span class="r-mark">○</span>':'<span class="r-mark"></span>';lh+=l.type==='yang'?'<div class="r-line" style="animation-delay:'+i*.1+'s"><div class="r-yang"></div>'+mk+'</div>':'<div class="r-line" style="animation-delay:'+i*.1+'s"><div class="r-yin"><span></span><span></span></div>'+mk+'</div>'});
  const cn=hasChanging?'<div style="margin-top:.5rem;font-size:.85rem;color:var(--crimson);letter-spacing:.1em">标 ○ 者为<button class="changing-help-link" onclick="openChangingLineHelp()" title="查看变爻解释">变爻</button></div>':'';
  const qn=question?'<div style="margin-bottom:1.5rem;font-size:.9rem;color:var(--text-muted);font-weight:200;opacity:0;animation:fadeUp2 .8s ease .1s both">所问方向：'+escapeHTML(question)+'</div>':'';
  const daxiangReading='<div class="daxiang-reading"><h3>大象 · 占卜总纲</h3><div class="daxiang-original">象曰：'+(classic?.daxiang||'')+'</div><div class="daxiang-plain">'+(modern?.core||hex.d)+'</div></div>';
  const selectedReading=question?'<div class="selected-reading"><h3>'+escapeHTML(question)+'解读</h3><p>'+getSelectedReading(question,classic,modern,hex)+'</p></div>':'';
  const plain=YAO_PLAIN[kw]||[];
  const changingCount=lines.filter(l=>l.changing).length;
  const yaoReading=classic?.yaoci?.length?'<details class="result-yao-details"><summary>六爻详解'+(changingCount?'<span class="yao-summary-note">本次 '+changingCount+' 个变爻</span>':'')+'</summary><div class="result-yao-list">'+classic.yaoci.map((y,i)=>{const plainText=plain[i]||'这一爻提示应结合当前阶段谨慎判断。';const pair=getChangingPairReading(lines[i],hex,modern,changedHex,changedModern,plainText);return`<div class="result-yao-row${lines[i]?.changing?' changing':''}"><div class="result-yao-head"><span class="result-yao-label">${y.label}</span>${lines[i]?.changing?'<span class="changing-badge">本次变爻</span>':''}</div><div class="result-yao-original">原文：${y.text}</div><div class="result-yao-plain">白话：${plainText}</div>${pair}</div>`}).join('')+'</div></details>':'';
  document.getElementById('result-area').innerHTML='<div class="result-hex"><div class="result-lines">'+lh+'</div><div class="hex-names result-hex-link" role="button" tabindex="0" onclick="openHexFromResult('+kw+')" onkeydown="handleHexLinkKey(event,'+kw+')" title="在知识库中查看'+hex.f+'"><h2>'+hex.n+'</h2><div class="fullname">'+hex.f+'　·　上'+TRI_NAME[upper]+'下'+TRI_NAME[lower]+'</div></div>'+cn+'</div>'+qn+'<div class="result-judgment">卦辞：'+(classic?.guaci||hex.j)+'</div>'+daxiangReading+selectedReading+yaoReading+trans+'<div class="deco-line"><span></span><em>占 卜 已 毕</em><span></span></div><button class="btn" onclick="goScreen(\'screen-landing\')">再 占 一 卦</button>';
  goScreen('screen-result');
}

function toggleSec(el){el.closest('.kb-sec').classList.toggle('open')}

  document.getElementById('kb-body').innerHTML='<div class="kb-panel active" id="kbp-bagua"></div><div class="kb-panel" id="kbp-hexagrams"></div><div class="kb-panel" id="kbp-yijing"></div>';

function buildBaguaPanel(){
  const p=document.getElementById('kbp-bagua');
  let html='';
  html+='<div class="kb-sec"><div class="kb-sec-head" onclick="toggleSec(this)"><span class="sh-title">先天八卦（伏羲）</span><span class="sh-arrow">▸</span></div><div class="kb-sec-body">';
  html+=buildDiagram([{s:'☰',n:'乾',t:50,l:0},{s:'☱',n:'兑',t:78,l:15},{s:'☲',n:'离',t:95,l:50},{s:'☳',n:'震',t:78,l:85},{s:'☴',n:'巽',t:22,l:85},{s:'☵',n:'坎',t:5,l:50},{s:'☶',n:'艮',t:22,l:15},{s:'☷',n:'坤',t:50,l:95}]);
  html+='</div></div>';
  html+='<div class="kb-sec"><div class="kb-sec-head" onclick="toggleSec(this)"><span class="sh-title">后天八卦（文王）</span><span class="sh-arrow">▸</span></div><div class="kb-sec-body">';
  html+=buildDiagram([{s:'☲',n:'离',t:50,l:0},{s:'☷',n:'坤',t:78,l:15},{s:'☱',n:'兑',t:95,l:50},{s:'☰',n:'乾',t:78,l:85},{s:'☵',n:'坎',t:50,l:95},{s:'☶',n:'艮',t:22,l:85},{s:'☳',n:'震',t:5,l:50},{s:'☴',n:'巽',t:22,l:15}]);
  html+='</div></div>';
  html+='<div class="kb-sec"><div class="kb-sec-head" onclick="toggleSec(this)"><span class="sh-title">八卦详述</span><span class="sh-arrow">▸</span></div><div class="kb-sec-body">';
  TG.forEach((t,i)=>{const lh=t.lines.map(l=>l?'<div class="bg-bar solid-b"></div>':'<div class="bg-bar half-b"><span></span><span></span></div>').join('');html+=`<div class="bg-card" id="bgc-${i}"><div class="bg-card-head" onclick="this.parentElement.classList.toggle('open')"><div class="bg-sym">${t.sym}</div><div class="bg-info"><div class="bg-name">${t.name}（${t.nature}）</div><div class="bg-nature">${t.family} · ${t.dir_hou}方</div></div><div class="bg-arrow">▸</div></div><div class="bg-detail"><div class="bg-lines">${lh}</div><div class="bg-row"><span class="bg-tag">属性：${t.attrs.split(' ')[0]}</span><span class="bg-tag">动物：${t.animal}</span><span class="bg-tag">身体：${t.body}</span><span class="bg-tag">先天位：${t.dir_li}</span><span class="bg-tag">后天位：${t.dir_hou}</span></div><div class="bg-desc">${t.desc}</div></div></div>`});
  html+='</div></div>';
  html+=`<div class="kb-sec"><div class="kb-sec-head" onclick="toggleSec(this)"><span class="sh-title">杂项</span><span class="sh-arrow">▸</span></div><div class="kb-sec-body"><div class="misc-block" id="kb-misc-changing"><div class="zy-h3">变爻与之卦</div><p class="misc-intro">六爻由下向上排列，依次为初爻、二爻、三爻、四爻、五爻、上爻。掷币或抽牌得到老阴、老阳时，该爻会发生阴阳转变，称为“变爻”。变爻反映局势中正在变化的关键位置。</p><div class="misc-table"><div class="misc-key">六</div><div>老阴：本爻为阴，变为阳，是变爻。</div><div class="misc-key">七</div><div>少阳：本爻为阳，保持不变。</div><div class="misc-key">八</div><div>少阴：本爻为阴，保持不变。</div><div class="misc-key">九</div><div>老阳：本爻为阳，变为阴，是变爻。</div></div><p class="misc-intro"><strong style="color:var(--gold)">本卦</strong>表示当下的基本局势；所有变爻改变阴阳后形成的<strong style="color:var(--gold)">之卦</strong>，表示局势可能转向的方向。变爻爻辞用于解释变化发生在哪一阶段、应如何应对。</p><div class="zy-h3">多变爻常用参考法</div><div class="misc-rule">无变爻：以本卦卦辞和大象为主。</div><div class="misc-rule">一个变爻：重点看本卦该爻的爻辞。</div><div class="misc-rule">两个变爻：两条爻辞合看，通常以上爻为主。</div><div class="misc-rule">三个变爻：本卦与之卦的卦辞合看，以本卦为主。</div><div class="misc-rule">四个变爻：参考之卦中两个不变爻，通常以下爻为主。</div><div class="misc-rule">五个变爻：重点参考之卦中唯一不变的爻。</div><div class="misc-rule">六爻全变：乾、坤参考“用九”“用六”；其余卦以之卦卦辞为主。</div><p class="misc-intro" style="margin-top:.7rem;color:var(--text-muted)">以上是常用取法，不是唯一规则。实际判断仍应结合所问事项、本卦大象、变爻位置和之卦整体含义。</p></div></div></div>`;
  p.innerHTML=html;
}
function buildDiagram(dots){let h='<div class="paagua-diagram"><div class="paagua-circle"></div><div class="paagua-center">☯</div>';dots.forEach(d=>{h+=`<div class="paagua-dot" style="top:${d.t}%;left:${d.l}%"><span class="s">${d.s}</span><span class="n">${d.n}</span></div>`});return h+'</div>'}

function buildHexagramPanel(){
  const p=document.getElementById('kbp-hexagrams');
  let html='<input type="text" class="hx-search" id="hx-search" placeholder="输入卦名搜索…">';
  html+='<div class="kb-sec"><div class="kb-sec-head" onclick="toggleSec(this)"><span class="sh-title">上经 · 三十卦（乾至离）</span><span class="sh-arrow">▸</span></div><div class="kb-sec-body"><div class="hx-grid" id="hx-grid1"></div></div></div>';
  html+='<div class="kb-sec"><div class="kb-sec-head" onclick="toggleSec(this)"><span class="sh-title">下经 · 三十四卦（咸至未济）</span><span class="sh-arrow">▸</span></div><div class="kb-sec-body"><div class="hx-grid" id="hx-grid2"></div></div></div>';
  p.innerHTML=html;
  const g1=document.getElementById('hx-grid1'),g2=document.getElementById('hx-grid2');
  for(let kw=0;kw<64;kw++){
    const idx=KW[kw],hex=H[idx],lo=idx%8,up=Math.floor(idx/8);
    const mL=[];for(let b=0;b<3;b++)mL.push((lo>>b)&1);for(let b=0;b<3;b++)mL.push((up>>b)&1);
    const mini=mL.map(l=>l?'<div class="my"></div>':'<div class="mn"><span></span><span></span></div>').join('');
    const t=document.createElement('div');t.className='hx-tile';t.dataset.kw=kw;t.dataset.idx=idx;t.dataset.name=hex.n;t.dataset.full=hex.f;
    t.innerHTML=`<span class="kw-num">${kw+1}</span><div class="hx-mini-lines">${mini}</div><div class="t-n">${hex.n}</div><span class="t-f">${TRI_NAME[up]+TRI_NATURE[up]+TRI_NAME[lo]+TRI_NATURE[lo]}</span>`;
    t.onclick=()=>showHexDetail(kw,idx);
    (kw<30?g1:g2).appendChild(t);
  }
  document.getElementById('hx-search').oninput=function(){
    const q=this.value.trim();
    document.querySelectorAll('.hx-tile').forEach(t=>{
      if(t.classList.contains('expanded')&&q&&!t.dataset.name.includes(q)&&!t.dataset.full.includes(q)){collapseHexTile(t)}
      t.style.display=(!q||t.dataset.name.includes(q)||t.dataset.full.includes(q))?'':'none';
    });
  };
}

function showHexDetail(kw,idx){
  const tile=document.querySelector(`.hx-tile[data-kw="${kw}"]`);
  if(tile.classList.contains('expanded')){collapseHexTile(tile);return}
  document.querySelectorAll('.hx-tile.expanded').forEach(t=>collapseHexTile(t));
  tile.dataset.origHtml=tile.innerHTML;
  const hex=H[idx],classic=CLASSICS[kw],modern=MODERN[kw],lo=idx%8,up=Math.floor(idx/8),upTri=TG_BY_NAME[TRI_NAME[up]],loTri=TG_BY_NAME[TRI_NAME[lo]];
  const lArr=[];for(let b=0;b<3;b++)lArr.push((lo>>b)&1);for(let b=0;b<3;b++)lArr.push((up>>b)&1);
  const linesHtml=lArr.reverse().map(l=>l?'<div class="hxt-yang"></div>':'<div class="hxt-yin"><span></span><span></span></div>').join('');
  tile.innerHTML=`<div class="hxt-inner"><div class="hxt-close" onclick="event.stopPropagation();collapseHexTile(this.closest('.hx-tile'))">✕</div><div class="hxt-top"><div class="hxt-lines">${linesHtml}</div><div><div class="hxt-name">${hex.n}</div><div class="hxt-full">${hex.f}　·　第${kw+1}卦</div><div class="hxt-comp">${upTri.sym} ${upTri.name}（${upTri.nature}）上 · ${loTri.name}（${loTri.nature}）下 ${loTri.sym}</div></div></div><div class="hxt-judge">卦辞：${classic?.guaci||hex.j}</div><div class="hxt-overview">${getHexOverview(hex,classic,modern,upTri,loTri)}</div>${buildClassicDetails(classic,true)}</div>`;
  tile.classList.add('expanded');
  setTimeout(()=>tile.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
}
function collapseHexTile(tile){if(tile.dataset.origHtml){tile.innerHTML=tile.dataset.origHtml}tile.classList.remove('expanded')}

function buildYijingPanel(){document.getElementById('kbp-yijing').innerHTML=`
<div class="kb-sec"><div class="kb-sec-head" onclick="toggleSec(this)"><span class="sh-title">入门总览</span><span class="sh-arrow">▸</span></div><div class="kb-sec-body"><div class="zy-section"><p class="zy-p">《周易》由“经”与“传”构成。经的主体是六十四卦、卦辞和爻辞，用简短象征语言记录处境与变化；传是后世解释系统，阐明卦象、义理和读法。</p><div class="zy-note">阅读《周易》不是只查“吉或凶”。它更重视：事情处在哪个阶段、哪些条件正在变化、怎样行动才能趋吉避凶。</div><div class="zy-grid"><div class="zy-item"><div class="zi-title">变 易</div><div class="zi-text">局势持续变化，没有永远固定的顺逆。</div></div><div class="zy-item"><div class="zi-title">不 易</div><div class="zi-text">变化虽多，仍有时位、因果和进退规律。</div></div><div class="zy-item"><div class="zi-title">简 易</div><div class="zi-text">复杂局面可用阴阳、上下、动静来抓住核心。</div></div><div class="zy-item"><div class="zi-title">时 位</div><div class="zi-text">同一行动放在不同阶段，结果可能完全不同。</div></div></div></div></div></div>
<div class="kb-sec"><div class="kb-sec-head" onclick="toggleSec(this)"><span class="sh-title">经、传与十翼</span><span class="sh-arrow">▸</span></div><div class="kb-sec-body"><div class="zy-section"><div class="zy-h3">经文主体</div><div class="zy-term-list"><div class="zy-term"><b>卦画</b>六条阴阳爻组成一个卦象。</div><div class="zy-term"><b>卦辞</b>对整卦局势作总判断。</div><div class="zy-term"><b>爻辞</b>分别说明六个阶段中的处境与行动。</div><div class="zy-term"><b>用九、用六</b>乾坤两卦六爻全变时的特殊辞句。</div></div><div class="zy-h3">十翼</div><div class="zy-grid"><div class="zy-item"><div class="zi-title">彖传·上下</div><div class="zi-text">解释卦名、卦辞和上下卦结构。</div></div><div class="zy-item"><div class="zi-title">象传·上下</div><div class="zi-text">大象解释整卦；小象解释各爻。</div></div><div class="zy-item"><div class="zi-title">系辞·上下</div><div class="zi-text">讨论易理、筮法、象数与圣人之道。</div></div><div class="zy-item"><div class="zi-title">文言传</div><div class="zi-text">专门阐释乾、坤两卦。</div></div><div class="zy-item"><div class="zi-title">说卦传</div><div class="zi-text">说明八卦属性、方位和万物取象。</div></div><div class="zy-item"><div class="zi-title">序卦·杂卦</div><div class="zi-text">说明卦序关系，并以对举方式概括卦义。</div></div></div><p class="zy-note">传统上常将《易传》与孔子联系；现代研究多认为这些文本经历了较长时期的形成与整理。</p></div></div></div>
<div class="kb-sec"><div class="kb-sec-head" onclick="toggleSec(this)"><span class="sh-title">六爻位置与阶段</span><span class="sh-arrow">▸</span></div><div class="kb-sec-body"><div class="zy-section"><p class="zy-p">六爻必须自下而上阅读。位置不仅代表高低，也代表事情从萌芽、发展到终结的过程。</p><div class="zy-line-map"><div class="zy-line-item"><div class="zy-line-pos">初爻</div><div class="zy-line-desc">事情初生，力量尚小，重在辨明方向。</div></div><div class="zy-line-item"><div class="zy-line-pos">二爻</div><div class="zy-line-desc">进入内部核心，常代表基础、执行与稳定。</div></div><div class="zy-line-item"><div class="zy-line-pos">三爻</div><div class="zy-line-desc">下卦之极，面临跨阶段压力，往往多危多疑。</div></div><div class="zy-line-item"><div class="zy-line-pos">四爻</div><div class="zy-line-desc">刚进入上卦，接近主事者，重在谨慎适应。</div></div><div class="zy-line-item"><div class="zy-line-pos">五爻</div><div class="zy-line-desc">居于尊位，常代表主导、成熟与承担全局。</div></div><div class="zy-line-item"><div class="zy-line-pos">上爻</div><div class="zy-line-desc">事情走到极点，可能完成，也可能盛极转衰。</div></div></div></div></div></div>
<div class="kb-sec"><div class="kb-sec-head" onclick="toggleSec(this)"><span class="sh-title">阴阳、得位与关系</span><span class="sh-arrow">▸</span></div><div class="kb-sec-body"><div class="zy-section"><div class="zy-term-list"><div class="zy-term"><b>阳爻 / 阴爻</b>阳多取刚、动、显；阴多取柔、静、承。它们是关系概念，不等于绝对好坏。</div><div class="zy-term"><b>当位</b>初、三、五为阳位，二、四、上为阴位；阳居阳位、阴居阴位称当位。得位通常较顺，但仍须结合全卦。</div><div class="zy-term"><b>得中</b>二爻居下卦之中，五爻居上卦之中。得中常表示行为不过度、能守平衡。</div><div class="zy-term"><b>正应</b>初与四、二与五、三与上相应；一阴一阳通常称有应，同性则可能无应或相敌。</div><div class="zy-term"><b>比</b>相邻两爻之间的亲近关系。</div><div class="zy-term"><b>承</b>下爻承接上爻。阴承阳常较顺，仍要看时位。</div><div class="zy-term"><b>乘</b>上爻凌驾下爻。阴乘阳常被视为力量关系失衡。</div></div><p class="zy-note">不能机械地把“当位、有应”直接等同于吉。卦辞、时势、主爻和整体结构优先于单一规则。</p></div></div></div>
<div class="kb-sec"><div class="kb-sec-head" onclick="toggleSec(this)"><span class="sh-title">一次完整的读卦顺序</span><span class="sh-arrow">▸</span></div><div class="kb-sec-body"><div class="zy-section"><div class="zy-steps"><div class="zy-step">先明确所问事项与时间范围，同一卦不能脱离问题解释。</div><div class="zy-step">确认本卦的上下卦、卦名和整体象征，判断当前基本局势。</div><div class="zy-step">读卦辞与大象，取得整次占问的总纲。</div><div class="zy-step">找出变爻，结合爻位判断变化发生在哪个阶段。</div><div class="zy-step">读变爻爻辞与小象，理解具体转折及行动提醒。</div><div class="zy-step">将所有变爻改变后得到之卦，观察后续发展方向。</div><div class="zy-step">最后回到现实条件，形成可以执行、可以验证的结论。</div></div><button class="changing-help-link" style="margin:.35rem 0 .2rem" onclick="openChangingLineHelp()">查看变爻与多变爻取法</button></div></div></div>
<div class="kb-sec"><div class="kb-sec-head" onclick="toggleSec(this)"><span class="sh-title">六十四卦的组织方式</span><span class="sh-arrow">▸</span></div><div class="kb-sec-body"><div class="zy-section"><p class="zy-p">六十四卦由八个三爻卦两两相重而成。下三爻称下卦或内卦，上三爻称上卦或外卦。下卦常用于观察内部、基础与起因，上卦常用于观察外部、发展与结果。</p><div class="zy-grid"><div class="zy-item"><div class="zi-title">上经三十卦</div><div class="zi-text">从乾、坤开始，到坎、离结束，较多讨论天地秩序与基本处境。</div></div><div class="zy-item"><div class="zi-title">下经三十四卦</div><div class="zi-text">从咸、恒开始，到既济、未济结束，较多涉及人伦互动与变化完成。</div></div></div><p class="zy-note">卦序不是简单的吉凶排行榜。《序卦传》以相承关系说明前后卦如何由一种处境转入另一种处境。</p></div></div></div>
<div class="kb-sec"><div class="kb-sec-head" onclick="toggleSec(this)"><span class="sh-title">历史与主要解释传统</span><span class="sh-arrow">▸</span></div><div class="kb-sec-body"><div class="zy-section"><div class="zy-timeline"><div class="zy-tl-item"><div class="zy-tl-era">早期筮占传统</div><div class="zy-tl-desc">卦爻辞保留了早期占筮、政治、战争、婚姻和生活经验的象征表达。</div></div><div class="zy-tl-item"><div class="zy-tl-era">战国至两汉</div><div class="zy-tl-desc">《易传》义理逐渐形成，汉代又发展出卦气、纳甲、消息等象数体系。</div></div><div class="zy-tl-item"><div class="zy-tl-era">魏晋义理</div><div class="zy-tl-desc">王弼等重视以简驭繁、得意忘象，从义理解释卦爻。</div></div><div class="zy-tl-item"><div class="zy-tl-era">宋代图书与理学</div><div class="zy-tl-desc">邵雍偏重象数图式，程颐重义理，朱熹兼顾义理与占筮。</div></div><div class="zy-tl-item"><div class="zy-tl-era">现代研究</div><div class="zy-tl-desc">结合传世文献、出土材料、文字训诂和思想史，重新讨论经传年代与原义。</div></div></div><div class="zy-grid"><div class="zy-item"><div class="zi-title">象数</div><div class="zi-text">重卦象、爻位、数字、方位与变化规则。</div></div><div class="zy-item"><div class="zi-title">义理</div><div class="zi-text">重德行、处境、进退和人生原则。</div></div></div></div></div></div>
<div class="kb-sec"><div class="kb-sec-head" onclick="toggleSec(this)"><span class="sh-title">常用术语速查</span><span class="sh-arrow">▸</span></div><div class="kb-sec-body"><div class="zy-section"><div class="zy-term-list"><div class="zy-term"><b>元</b>开始、根本、创生。</div><div class="zy-term"><b>亨</b>通达、顺利展开。</div><div class="zy-term"><b>利</b>适宜、有利于某种行动。</div><div class="zy-term"><b>贞</b>正固、守正，也与占问判断有关。</div><div class="zy-term"><b>吉 / 凶</b>有利或不利的趋势，不等于无条件的命定结果。</div><div class="zy-term"><b>无咎</b>虽不一定大吉，但处理得当可以没有过失。</div><div class="zy-term"><b>悔 / 吝</b>悔是可觉察并改正的问题；吝多指局促、艰难或遗憾。</div><div class="zy-term"><b>利有攸往</b>有所前往、有所行动较为有利。</div><div class="zy-term"><b>利涉大川</b>适合承担重要行动或跨越重大难关。</div></div></div></div></div>
<div class="kb-sec"><div class="kb-sec-head" onclick="toggleSec(this)"><span class="sh-title">占筮原则与使用边界</span><span class="sh-arrow">▸</span></div><div class="kb-sec-body"><div class="zy-section"><div class="zy-term-list"><div class="zy-term"><b>一事一问</b>问题越明确，卦象越容易落到具体处境。</div><div class="zy-term"><b>不宜反复重占</b>因为不满意结果而连续重占，会破坏问题边界。</div><div class="zy-term"><b>先看条件</b>吉卦也有条件，凶卦也包含避险和转机。</div><div class="zy-term"><b>占后要行动</b>解释应落到可以执行的选择，而非制造恐惧。</div><div class="zy-term"><b>文化参考</b>占筮不能替代医疗、法律、投资等专业判断，也不应代替个人责任。</div></div><div class="zy-note">更稳妥的用法，是把卦象当作观察处境、发现盲点和梳理选择的工具，而不是不可改变的命令。</div><div class="deco-line" style="margin:1.2rem 0"><span></span><em>观 象 玩 辞 明 变 审 时</em><span></span></div></div></div></div>`}
